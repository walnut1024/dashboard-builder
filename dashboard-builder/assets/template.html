<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            colors: {
              screen: {
                bg: "#07111f",
                panel: "rgba(11, 27, 47, 0.82)",
                line: "rgba(96, 165, 250, 0.24)",
                text: "#dbeafe",
                muted: "#7dd3fc",
                accent: "#22d3ee",
                warn: "#f59e0b",
                danger: "#ef4444",
                ok: "#22c55e",
              },
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 50% 38%, rgba(34, 211, 238, 0.16), transparent 30%),
          linear-gradient(135deg, #07111f 0%, #081827 46%, #050a14 100%);
        color: #dbeafe;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.055) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.25));
      }

      .dashboard-shell {
        width: min(100vw, 1920px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px;
      }

      .panel {
        border: 1px solid rgba(96, 165, 250, 0.24);
        background: rgba(11, 27, 47, 0.82);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
      }

      .panel-title {
        color: #bfdbfe;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .chart {
        width: 100%;
        height: 100%;
        min-height: 180px;
      }

      .dashboard-grid {
        height: calc(100vh - 222px);
        min-height: 0;
      }

      .node {
        border: 1px solid rgba(125, 211, 252, 0.35);
        background: linear-gradient(180deg, rgba(15, 48, 79, 0.92), rgba(10, 24, 42, 0.92));
      }
    </style>
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="mb-4 flex items-center justify-between gap-4">
        <div>
          <div class="text-xs font-semibold uppercase tracking-[0.18em] text-cyan-200/80">Operations Dashboard</div>
          <h1 class="mt-1 text-2xl font-bold text-white">Command Center Overview</h1>
        </div>
        <div class="flex items-center gap-3 text-sm text-sky-100/80">
          <span class="rounded border border-sky-400/25 bg-sky-400/10 px-3 py-1">1920x1080</span>
          <span id="lastUpdated" class="rounded border border-emerald-400/25 bg-emerald-400/10 px-3 py-1">Updated --:--</span>
        </div>
      </header>

      <section class="mb-4 grid grid-cols-4 gap-4" data-dashboard-region="kpi-band">
        <article class="panel rounded-md p-4" data-component="kpi-card">
          <div class="text-sm text-sky-100/70">Operational Index</div>
          <div class="mt-2 flex items-end justify-between">
            <div class="text-4xl font-bold tabular-nums text-white">92.4</div>
            <div class="text-sm font-semibold text-emerald-300">+3.8%</div>
          </div>
          <div class="mt-3 h-1.5 rounded-full bg-slate-700"><div class="h-full w-[92%] rounded-full bg-cyan-300"></div></div>
        </article>
        <article class="panel rounded-md p-4" data-component="kpi-card">
          <div class="text-sm text-sky-100/70">Active Events</div>
          <div class="mt-2 flex items-end justify-between">
            <div class="text-4xl font-bold tabular-nums text-white">128</div>
            <div class="text-sm font-semibold text-amber-300">12 warning</div>
          </div>
          <div class="mt-3 h-1.5 rounded-full bg-slate-700"><div class="h-full w-[68%] rounded-full bg-amber-300"></div></div>
        </article>
        <article class="panel rounded-md p-4" data-component="kpi-card">
          <div class="text-sm text-sky-100/70">SLA Compliance</div>
          <div class="mt-2 flex items-end justify-between">
            <div class="text-4xl font-bold tabular-nums text-white">97.1%</div>
            <div class="text-sm font-semibold text-emerald-300">stable</div>
          </div>
          <div class="mt-3 h-1.5 rounded-full bg-slate-700"><div class="h-full w-[97%] rounded-full bg-emerald-300"></div></div>
        </article>
        <article class="panel rounded-md p-4" data-component="kpi-card">
          <div class="text-sm text-sky-100/70">Risk Score</div>
          <div class="mt-2 flex items-end justify-between">
            <div class="text-4xl font-bold tabular-nums text-white">18</div>
            <div class="text-sm font-semibold text-cyan-200">low</div>
          </div>
          <div class="mt-3 h-1.5 rounded-full bg-slate-700"><div class="h-full w-[18%] rounded-full bg-cyan-300"></div></div>
        </article>
      </section>

      <section class="dashboard-grid grid grid-cols-[360px_minmax(0,1fr)_360px] gap-4">
        <aside class="grid min-h-0 grid-rows-[minmax(0,1fr)_minmax(0,1fr)] gap-4">
          <section class="panel rounded-md p-4" data-component="distribution-panel">
            <div class="panel-title mb-3">Status Distribution</div>
            <div id="statusChart" class="chart"></div>
          </section>
          <section class="panel rounded-md p-4" data-component="ranking-list">
            <div class="panel-title mb-3">Top Areas</div>
            <div id="rankingList" class="space-y-3"></div>
          </section>
        </aside>

        <section class="grid min-h-0 grid-rows-[minmax(0,1fr)_220px] gap-4">
          <section class="panel relative overflow-hidden rounded-md p-5" data-component="center-situation-view">
            <div class="panel-title">Center Situation View</div>
            <div class="absolute left-1/2 top-1/2 h-[360px] w-[360px] -translate-x-1/2 -translate-y-1/2 rounded-full border border-cyan-300/25"></div>
            <div class="absolute left-1/2 top-1/2 h-[250px] w-[250px] -translate-x-1/2 -translate-y-1/2 rounded-full border border-cyan-300/20"></div>
            <div class="absolute left-1/2 top-1/2 flex h-40 w-40 -translate-x-1/2 -translate-y-1/2 flex-col items-center justify-center rounded-full border border-cyan-200/40 bg-cyan-300/10 text-center shadow-[0_0_60px_rgba(34,211,238,0.24)]">
              <div class="text-sm text-cyan-100/75">Health Index</div>
              <div class="mt-1 text-5xl font-bold tabular-nums text-white">92</div>
              <div class="mt-1 text-xs text-emerald-200">Normal Operation</div>
            </div>
            <div id="situationNodes"></div>
          </section>

          <section class="panel rounded-md p-4" data-component="metric-trend-panel">
            <div class="panel-title mb-3">24h Trend</div>
            <div id="trendChart" class="chart"></div>
          </section>
        </section>

        <aside class="grid min-h-0 grid-rows-[minmax(0,1fr)_minmax(0,1fr)] gap-4">
          <section class="panel rounded-md p-4" data-component="alert-list">
            <div class="panel-title mb-3">Latest Alerts</div>
            <div id="alertList" class="space-y-3"></div>
          </section>
          <section class="panel rounded-md p-4" data-component="status-matrix">
            <div class="panel-title mb-3">Node Matrix</div>
            <div id="statusMatrix" class="grid grid-cols-3 gap-2"></div>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const mockData = {
        ranking: [
          ["North District", 94],
          ["Harbor Zone", 88],
          ["Central Hub", 82],
          ["South Grid", 76],
          ["Airport Area", 71],
        ],
        alerts: [
          ["10:42", "warning", "Response time approaching threshold"],
          ["10:36", "danger", "Node A-17 offline"],
          ["10:25", "normal", "Dispatch queue normalized"],
          ["10:18", "warning", "High load in Harbor Zone"],
        ],
        nodes: [
          ["Core", "normal", "left-[50%] top-[18%]"],
          ["North", "normal", "left-[25%] top-[34%]"],
          ["East", "warning", "left-[72%] top-[38%]"],
          ["South", "normal", "left-[50%] top-[75%]"],
          ["West", "danger", "left-[18%] top-[62%]"],
        ],
        matrix: ["A1", "A2", "B1", "B2", "C1", "C2", "D1", "D2", "E1"],
      };

      const colors = {
        ok: "#22c55e",
        warn: "#f59e0b",
        danger: "#ef4444",
        accent: "#22d3ee",
        text: "#dbeafe",
        muted: "#7dd3fc",
      };

      document.getElementById("lastUpdated").textContent = `Updated ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;

      document.getElementById("rankingList").innerHTML = mockData.ranking
        .map(([name, value], index) => `
          <div>
            <div class="mb-1 flex items-center justify-between text-sm">
              <span class="text-sky-100/85">${index + 1}. ${name}</span>
              <span class="font-semibold tabular-nums text-white">${value}</span>
            </div>
            <div class="h-2 rounded-full bg-slate-700">
              <div class="h-full rounded-full bg-cyan-300" style="width:${value}%"></div>
            </div>
          </div>
        `)
        .join("");

      document.getElementById("alertList").innerHTML = mockData.alerts
        .map(([time, level, text]) => {
          const color = level === "danger" ? "text-red-300 border-red-400/30 bg-red-400/10" : level === "warning" ? "text-amber-300 border-amber-400/30 bg-amber-400/10" : "text-emerald-300 border-emerald-400/30 bg-emerald-400/10";
          return `
            <div class="rounded border border-sky-400/15 bg-sky-400/5 p-3">
              <div class="flex items-center justify-between gap-2">
                <span class="text-xs tabular-nums text-sky-100/60">${time}</span>
                <span class="rounded border px-2 py-0.5 text-xs ${color}">${level}</span>
              </div>
              <div class="mt-2 text-sm text-sky-50">${text}</div>
            </div>
          `;
        })
        .join("");

      document.getElementById("statusMatrix").innerHTML = mockData.matrix
        .map((item, index) => {
          const status = index === 4 ? "bg-amber-300" : index === 7 ? "bg-red-400" : "bg-emerald-300";
          return `<div class="node rounded p-3 text-center text-sm"><div class="mx-auto mb-2 h-2.5 w-2.5 rounded-full ${status}"></div>${item}</div>`;
        })
        .join("");

      document.getElementById("situationNodes").innerHTML = mockData.nodes
        .map(([name, status, position]) => {
          const dot = status === "danger" ? "bg-red-400" : status === "warning" ? "bg-amber-300" : "bg-emerald-300";
          return `<div class="node absolute ${position} -translate-x-1/2 -translate-y-1/2 rounded px-4 py-3 text-center text-sm"><div class="mx-auto mb-2 h-2.5 w-2.5 rounded-full ${dot}"></div>${name}</div>`;
        })
        .join("");

      function makeChart(id, option) {
        const chart = echarts.init(document.getElementById(id), null, { renderer: "canvas" });
        chart.setOption(option);
        window.addEventListener("resize", () => chart.resize());
        return chart;
      }

      makeChart("statusChart", {
        backgroundColor: "transparent",
        color: [colors.ok, colors.warn, colors.danger, colors.accent],
        tooltip: { trigger: "item" },
        legend: { bottom: 0, textStyle: { color: colors.text } },
        series: [{
          type: "pie",
          radius: ["48%", "72%"],
          center: ["50%", "43%"],
          label: { color: colors.text },
          data: [
            { name: "Normal", value: 76 },
            { name: "Warning", value: 18 },
            { name: "Critical", value: 6 },
          ],
        }],
      });

      makeChart("trendChart", {
        backgroundColor: "transparent",
        color: [colors.accent, colors.warn],
        tooltip: { trigger: "axis" },
        grid: { left: 42, right: 20, top: 24, bottom: 28 },
        xAxis: { type: "category", boundaryGap: false, data: ["00", "04", "08", "12", "16", "20", "24"], axisLabel: { color: colors.text }, axisLine: { lineStyle: { color: "rgba(219,234,254,.3)" } } },
        yAxis: { type: "value", axisLabel: { color: colors.text }, splitLine: { lineStyle: { color: "rgba(219,234,254,.12)" } } },
        series: [
          { name: "Events", type: "line", smooth: true, areaStyle: { opacity: 0.18 }, data: [42, 58, 75, 61, 88, 70, 64] },
          { name: "Warnings", type: "line", smooth: true, data: [8, 12, 18, 14, 22, 19, 12] },
        ],
      });
    </script>
  </body>
</html>
